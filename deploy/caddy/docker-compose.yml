# Edge reverse proxy — deploy to ~/caddy (kept in git for reproducibility).
#   cp -r deploy/caddy ~/caddy && cd ~/caddy && docker compose up -d
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # certificates — must persist
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
    external: true

volumes:
  caddy_data: {}
  caddy_config: {}
